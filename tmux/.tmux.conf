# prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# mouse
set -g mouse on

# renumber windows when deleting
set -g renumber-windows on

# fast vim escape
set -s escape-time 0

# pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# better splits
bind | split-window -h
bind - split-window -v

# default bar style
set -g status-style 'bg=colour22 fg=colour0'  

# Swap to orange when prefix is held
set -g status-left '#{?client_prefix,#[bg=colour124 fg=colour0 bold]▎PREFIX #[default] , [#{session_name}] }'

# Truncated left length
set -g status-left-length 40

# TMUX Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
